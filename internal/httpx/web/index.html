<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>shoplist</title>

    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/app.css" />
  </head>

  <body>
    <main class="wrap">
      <header class="top">
        <h1>shoplist</h1>
        <button id="btnLogout" type="button" class="ghost hidden">
          Logout
        </button>
      </header>

      <section id="loginCard" class="card">
        <h2>Login</h2>
        <form id="loginForm" class="stack">
          <input
            id="pw"
            type="password"
            placeholder="Household password"
            autocomplete="current-password"
            required
          />
          <button type="submit">Login</button>
          <p id="loginErr" class="err hidden"></p>
        </form>
      </section>

      <section id="appCard" class="card hidden">
        <form id="addForm" class="row">
          <input
            id="newText"
            type="text"
            placeholder="Add item…"
            autocomplete="off"
          />
          <button type="submit">Add</button>
        </form>

        <div class="split">
          <section>
            <h2>List</h2>
            <ul id="items" class="list"></ul>
            <div class="row end">
              <button id="btnClearDone" type="button" class="ghost">
                Clear done
              </button>
            </div>
          </section>

          <section>
            <h2>Last used</h2>
            <ul id="history" class="list"></ul>
          </section>
        </div>
      </section>

      <p class="muted small">Tip: Add to Home Screen to use as a PWA.</p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
