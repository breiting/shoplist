<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>Einkaufsliste</title>

    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/icons/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/icons/favicon-16.png"
    />

    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/app.css" />
  </head>

  <body>
    <main class="wrap">
      <header class="top">
        <h1>Einkaufsliste</h1>
        <button id="btnLogout" type="button" class="ghost hidden">
          Ausloggen
        </button>
      </header>

      <section id="loginCard" class="card">
        <h2>Login</h2>
        <form id="loginForm" class="stack">
          <input
            id="pw"
            type="password"
            placeholder="Haushaltspasswort"
            autocomplete="current-password"
            required
          />
          <button type="submit">Einloggen</button>
          <p id="loginErr" class="err hidden"></p>
        </form>
      </section>

      <section id="appCard" class="card hidden">
        <form id="addForm" class="row">
          <select id="shopSelect" aria-label="Shop"></select>
          <input
            id="newText"
            type="text"
            placeholder="Artikel …"
            autocomplete="off"
          />
          <button type="submit" id="btnAdd" aria-label="Hinzufügen">+</button>
        </form>

        <div class="split">
          <section>
            <h2>Liste</h2>
            <ul id="items" class="list"></ul>
            <div class="row end">
              <button id="btnClearDone" type="button" class="ghost">
                Einkauf abschliessen
              </button>
            </div>
          </section>

          <section>
            <h2>Zuletzt gekauft</h2>
            <ul id="history" class="list"></ul>
          </section>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
