services:
  shoplist:
    build: .
    container_name: shoplist
    environment:
      - SHOPLIST_ADDR=:8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/shoplist", "--help"]
      interval: 30s
      timeout: 3s
      retries: 3
