services:
  shoplist:
    build: .
    container_name: shoplist
    environment:
      - SHOPLIST_ADDR=:8080
      - SHOPLIST_PASSWORD=changeme
      - SHOPLIST_DATA_DIR=/data
      - SHOPLIST_SESSION_TTL_DAYS=180
      - SHOPLIST_COOKIE_SECURE=0
    volumes:
      - shoplist_data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  shoplist_data:
